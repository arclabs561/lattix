name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test all features
        run: cargo test --workspace --all-features

      - name: Test default features
        run: cargo test --workspace

      - name: Check minimal features
        run: cargo check --workspace --no-default-features --lib

      - name: Package
        run: cargo package --manifest-path lattix/Cargo.toml

      - name: Semver check
        run: |
          cargo install cargo-semver-checks --locked || true
          cargo semver-checks check-release --manifest-path lattix/Cargo.toml --all-features

      - name: Supply-chain policy
        run: |
          cargo install cargo-deny --locked || true
          cargo deny check

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.87.0
      - uses: Swatinem/rust-cache@v2

      - name: Check MSRV all features
        run: cargo check --workspace --all-features

      - name: Check MSRV minimal features
        run: cargo check --workspace --no-default-features --lib
