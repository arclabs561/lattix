name: publish

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to publish to crates.io"
        required: true
        default: "dry-run"

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Guard
        run: |
          if [ "${INPUTS_CONFIRM}" != "publish" ]; then
            echo "Refusing to publish: set workflow input confirm=publish"
            exit 1
          fi
        env:
          INPUTS_CONFIRM: ${{ inputs.confirm }}

      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test all features
        run: cargo test --workspace --all-features

      - name: Test default features
        run: cargo test --workspace

      - name: Check minimal features
        run: cargo check --workspace --no-default-features --lib

      - name: Semver check
        run: |
          cargo install cargo-semver-checks --locked || true
          cargo semver-checks check-release --manifest-path lattix/Cargo.toml --all-features

      - name: Supply-chain policy
        run: |
          cargo install cargo-deny --locked || true
          cargo deny check

      - name: cargo publish (dry-run)
        run: cargo publish -p lattix --dry-run

      - name: Authenticate (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish (lattix)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p lattix
