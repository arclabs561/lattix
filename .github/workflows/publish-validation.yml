name: publish-validation

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test all features
        run: cargo test --workspace --all-features

      - name: Test default features
        run: cargo test --workspace

      - name: Check minimal features
        run: cargo check --workspace --no-default-features --lib

      - name: Semver check
        run: |
          cargo install cargo-semver-checks --locked || true
          cargo semver-checks check-release --manifest-path lattix/Cargo.toml --all-features

      - name: Supply-chain policy
        run: |
          cargo install cargo-deny --locked || true
          cargo deny check

      - name: cargo publish (dry-run)
        run: cargo publish -p lattix --dry-run

      - name: crates.io status (lattix)
        run: |
          python3 - <<'PY'
          import json
          import urllib.error
          import urllib.request
          
          name = "lattix"
          url = f"https://crates.io/api/v1/crates/{name}"
          try:
              with urllib.request.urlopen(url, timeout=10) as resp:
                  data = json.load(resp)
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print(f"crates.io: {name} not found (ok for first publish)")
                  raise SystemExit(0)
              print(f"crates.io query failed for {name}: HTTP {e.code}: {e}")
              raise SystemExit(1)
          except Exception as e:
              print(f"crates.io query failed for {name}: {e}")
              raise SystemExit(1)
          
          crate = data.get("crate", {})
          print(f"name={crate.get('name')}")
          print(f"max_version={crate.get('max_version')}")
          print(f"downloads={crate.get('downloads')}")
          PY
